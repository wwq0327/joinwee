{% extends 'userena/base_userena.html' %}
{% load i18n thumbnail %}

{% block title %}我们的学友{% endblock %}

{% block content %}
<div class="row">
<h3 class="page-header t_c">我们的学友</h3>

{% for profile in profile_list %}
  <div class="col-xs-6 col-sm-3 col-md-2 text-center" style="min-height: 120px;">
    <a href="{% url 'profile_detail' profile.user.username %}">
      {% if profile.mugshot %}
        <img src="{{ profile.mugshot|thumbnail_url:'com_header' }}" class="img-rounded">
      {% else %}
        <img src="{{ profile.get_mugshot_url }}" width="64" height="64" class="img-rounded">
      {% endif %}
    </a>
    <p><small><a href="{% url 'profile_detail' profile.user.username %}">{{ profile.get_nick_name }}</a></small></p>
  </div>
{% empty %}
  <p class="text-muted">暂无学友</p>
{% endfor %}

</div>
{% endblock %}
