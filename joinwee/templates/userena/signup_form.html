{% extends 'userena/base_userena.html' %}
{% load i18n %}

{% block title %}欢迎加入WEE{% endblock %}

{% block content %}
<div class="my-top-header">

  <h2 class="page-header">欢迎加入WEE</h2>

  <div class="row">
    <div class="col-lg-8">
      <form action="" method="post" class="form-horizontal">
	{% csrf_token %}
	<fieldset>
	  {% for field in form %}
          <p>
            <div class="form-group">
              <label for="id_{{ field.name }}" class="col-lg-4 control-label">{{ field.label_tag }}</label>
              <div class="col-lg-4">{{ field }}</div>
	      {% if field.errors %}
	      <div class="col-lg-4"><span class="text-danger">{{ field.errors }}</span></div>
	      {% endif %}
            </div>
	  </p>
	  {% endfor %}
	</fieldset>
	<div class="form-group">
          <div class="col-lg-offset-4 col-lg-2">
            <input type="submit" class="btn btn-primary btn-block" value="{% trans "Signup"%}" />
          </div>
	</div>

      </form>
    </div>

    <div class="col-lg-4">
      <strong><small>你还可以用第三方帐号登录</small></strong>
      <div class="extoauth2">
	<a class="icon weibo" href="{% url 'socialauth_begin' 'weibo' %}">微博登录</a>
	<a class="icon douban" href="{% url 'socialauth_begin' 'douban2' %}">豆瓣登录</a>
      </div>

      <p><small><span class="text-muted">已有帐号？</span><a href="{% url 'userena_signin' %}">马上登录</a></small></p>

    </div>

  </div> 

</div>
{% endblock %}
