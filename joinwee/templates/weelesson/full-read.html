{% load markup %}
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta http-equiv="Content Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>{{ lesson.name }}--WEE-Beta 用智慧创造好玩有趣的开放学习机会</title>

    <!-- Bootstrap core CSS -->
    <link href="{{ MEDIA_URL }}css/bootstrap.css" rel="stylesheet">

    <!-- Custom styles for this template -->
        <link href="{{ MEDIA_URL }}css/main.css" rel="stylesheet">
        <script src="{{ MEDIA_URL }}js/jquery-3.7.1.min.js"></script>
    <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
        <script src="{{ MEDIA_URL }}js/html5shiv.js"></script>
        <script src="{{ MEDIA_URL }}js/respond.min.js"></script>
    <![endif]-->
  </head>

  <body>

    <!-- Wrap all page content here -->
    <div class="hide" id="flash"></div>
    <div id="wrap" style="background: #fbfbea;">
      <aside class="aside hidden-print">
        <ul class="list-unstyled read-panel">
          <li><a href="{{ lesson.get_absolute_url }}"" title="微课完整模式"><span class="glyphicon glyphicon-th"></a></span></li>
          <li class="hide"><a href="#" title="全屏阅读"><span class="glyphicon glyphicon-fullscreen"></a></span></li>
        </ul>
      </aside>
      <div class="full-container">
        <div class="page-header">
          <div class="read-title">{{ lesson.name }}</div>
        </div>
        <div class="read-content">{{ lesson.materials|markdown:"safe" }}</div>
      </div>
    </div>


    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="{{ MEDIA_URL }}js/bootstrap.min.js"></script>
        <script src="{{ MEDIA_URL }}js/jquery.scrollUp.min.js"></script>
        <script type="text/javascript" src="{{ MEDIA_URL }}js/main.js"></script>
        <script type="text/javascript">
        $(document).ready(function () {
        var url = window.location;
        // Will only work if string in href matches with location
        $('ul.nav a[href="'+url+'"]').parent().addClass('active');
        // Will also work for relative and absolute hrefs
        $('ul.nav a').filter(function () {
        return this.href == url;
        }).parent().addClass('active');
        });
        </script>
        {% block script %}{% endblock %}
        <script>
          (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
          (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
          m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
          })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

          ga('create', 'UA-45492177-1', 'joinwee.com');
          ga('send', 'pageview');

        </script>
  </body>
</html>
